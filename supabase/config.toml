project_id = "reelspace"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/confirm"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.prepare-upload]
verify_jwt = true

[functions.complete-upload]
verify_jwt = true

[functions.delete-video]
verify_jwt = true

[functions.storage-status]
verify_jwt = true
